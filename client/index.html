<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>STARFRAG</title>
<style>
  :root { --amber:#ffb03a; --cyan:#3cd6ff; --hot:#ff3c4a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#05060a; overflow:hidden;
    font-family:'Courier New', monospace; color:var(--amber);
    touch-action:none; overscroll-behavior:none; -webkit-text-size-adjust:100%; }
  #app { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  #screen { image-rendering:pixelated; background:#05060a; cursor:crosshair;
    width:100%; height:100%; object-fit:contain; touch-action:none; }

  /* crosshair */
  #cross { position:absolute; left:50%; top:50%; width:18px; height:18px;
    transform:translate(-50%,-50%); pointer-events:none; z-index:10; opacity:0.85; }
  #cross::before, #cross::after { content:''; position:absolute; background:var(--cyan); }
  #cross::before { left:8px; top:0; width:2px; height:18px; }
  #cross::after { top:8px; left:0; height:2px; width:18px; }

  /* HUD */
  .hud { position:absolute; z-index:11; pointer-events:none;
    text-shadow:0 0 6px rgba(0,0,0,0.9); letter-spacing:1px; }
  #arena { top:10px; left:12px; font-size:12px; color:var(--cyan); opacity:0.75; }
  #hpwrap { bottom:14px; left:16px; }
  #hpwrap .lbl { font-size:10px; opacity:0.6; }
  #hp { font-size:30px; font-weight:bold; line-height:1; }
  #hpbar { width:150px; height:6px; margin-top:4px; background:#221; border:1px solid #443; }
  #hpbar i { display:block; height:100%; width:100%; background:var(--amber); }
  /* ARMOR readout — sits just above INTEGRITY; dims to near-nothing at 0 plates */
  #armorwrap { bottom:64px; left:16px; transition:opacity .2s; }
  #armorwrap .lbl { font-size:10px; opacity:0.6; }
  #armor { font-size:20px; font-weight:bold; line-height:1; color:#7ab0ff; }
  #armorbar { width:150px; height:5px; margin-top:3px; background:#122033; border:1px solid #2b4a6b; }
  #armorbar i { display:block; height:100%; width:0%; background:#5aa0ff; }
  #ammowrap { bottom:14px; right:16px; text-align:right; }
  #ammo { font-size:30px; font-weight:bold; line-height:1; }
  #ammowrap .lbl { font-size:10px; opacity:0.6; }
  #weapon { font-size:11px; color:var(--cyan); opacity:0.8; }
  #scoreboard { top:10px; right:12px; text-align:right; font-size:12px; min-width:120px; }
  #scoreboard .row { opacity:0.9; }
  #scoreboard .me { color:var(--cyan); }
  #killfeed { top:40px; right:12px; text-align:right; font-size:11px; }
  #killfeed div { opacity:0.9; margin-top:2px; }
  #status { top:26px; left:12px; font-size:11px; opacity:0.7; }
  #dmgflash { position:absolute; inset:0; z-index:9; pointer-events:none;
    background:radial-gradient(circle, transparent 40%, var(--hot) 130%); opacity:0; }
  #ventflash { position:absolute; inset:0; z-index:9; pointer-events:none;
    background:radial-gradient(circle, transparent 25%, var(--cyan) 125%); opacity:0; }

  /* objective banner (airlock win-mode; hidden on deathmatch decks) */
  #objective { top:12px; left:50%; transform:translateX(-50%); text-align:center;
    display:none; --win:var(--amber); }
  #objective .phase { font-size:15px; font-weight:bold; letter-spacing:3px; color:var(--amber); }
  #objective .sub { font-size:11px; opacity:0.85; margin-top:2px; color:var(--cyan); }
  #objective.warn .phase { color:var(--hot); }
  #objective.vent .phase { color:var(--win); text-shadow:0 0 10px var(--win); }
  #objective.vent .sub { color:var(--hot); }
  #objective .prompt { margin-top:5px; font-size:10px; letter-spacing:2px; color:var(--amber);
    opacity:0.8; animation:promptpulse 1.6s ease-in-out infinite; }
  @keyframes promptpulse { 0%,100%{opacity:0.45} 50%{opacity:0.95} }
  #objective .pips { margin-top:5px; display:flex; gap:6px; justify-content:center; }
  #objective .pip { width:12px; height:14px; border:1px solid #3a4a52; position:relative;
    display:inline-block; background:rgba(0,0,0,0.4); }
  #objective .pip i { position:absolute; left:0; bottom:0; width:100%; display:block; }

  /* THE QUAD telegraph clock (deck7v2 only) — left rail, clear of the centre objective stack */
  #quadclock { display:none; top:44px; left:12px; text-align:left;
    font-size:12px; font-weight:bold; letter-spacing:2px; color:#c86bff; }
  #quadclock.ready { color:#e6b3ff; text-shadow:0 0 10px #c86bff;
    animation:quadpulse 0.7s ease-in-out infinite; }
  @keyframes quadpulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

  /* start / dead overlays */
  #overlay { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:14px;
    background:rgba(5,6,10,0.82); cursor:pointer; }
  #overlay h1 { font-size:40px; letter-spacing:8px; color:var(--amber); }
  #overlay .sub { font-size:13px; color:var(--cyan); opacity:0.85; max-width:440px; line-height:1.6; }
  #overlay .go { font-size:14px; border:1px solid var(--amber); padding:10px 22px; margin-top:8px; }
  #overlay .keys { font-size:11px; opacity:0.6; }
  /* start-screen arena picker */
  #arenapick { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin:6px 0; }
  .acard { width:200px; max-width:42vw; padding:14px 16px; text-align:center; cursor:pointer;
    border:1px solid rgba(120,140,160,0.5); border-radius:6px; background:rgba(12,16,24,0.6);
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
  .acard:hover { transform:translateY(-2px); }
  .acard.cur { border-color:var(--ac); box-shadow:0 0 16px -2px var(--ac); background:rgba(20,26,36,0.75); }
  .acard .an { font-size:18px; letter-spacing:3px; color:var(--ac); font-weight:bold; }
  .acard .at { font-size:10px; letter-spacing:1px; color:#9fb4c4; margin-top:6px; min-height:24px; }
  .acard .ago { font-size:11px; letter-spacing:2px; margin-top:10px; color:var(--ac); opacity:0.9; }
  .hide { display:none !important; }
</style>

<div id="app">
  <canvas id="screen" width="384" height="240"></canvas>
  <div id="cross"></div>
  <div id="dmgflash"></div>
  <div id="ventflash"></div>

  <div class="hud" id="objective"></div>
  <div class="hud" id="quadclock"></div>
  <div class="hud" id="arena">STARFRAG · connecting…</div>
  <div class="hud" id="status"></div>
  <div class="hud" id="scoreboard"></div>
  <div class="hud" id="killfeed"></div>

  <div class="hud" id="armorwrap">
    <div class="lbl">ARMOR</div>
    <div id="armor">0</div>
    <div id="armorbar"><i></i></div>
  </div>
  <div class="hud" id="hpwrap">
    <div class="lbl">INTEGRITY</div>
    <div id="hp">100</div>
    <div id="hpbar"><i></i></div>
  </div>
  <div class="hud" id="ammowrap">
    <div class="lbl">CELLS</div>
    <div id="ammo">12</div>
    <div id="weapon">PULSE CARBINE</div>
  </div>

  <div id="overlay">
    <h1>STARFRAG</h1>
    <div class="sub">A powered-but-abandoned starship, in orbit. The crew is gone.
      You are not the only thing still moving on Deck 7.</div>
    <div class="go">CLICK TO ENTER THE ARENA</div>
    <div class="keys">WASD move · MOUSE look · CLICK fire · R reload · T report to BMO · M mark</div>
  </div>
</div>

<script src="playtest-link.js?v=rec1"></script>
<!-- ?v bumped on client changes: Cloudflare caches js/* for 5d, the HTML is served
     fresh (cf-cache DYNAMIC), so a new query key is how a client edit reaches users. -->
<script type="module" src="js/game.js?v=powerups"></script>
